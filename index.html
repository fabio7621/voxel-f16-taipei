<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VOXEL SQUADRON — F-16 OVER TAIPEI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: linear-gradient(180deg, #1b3a6b 0%, #3f6fae 38%, #7fb2d9 70%, #cfe6ef 100%);
    font-family: "Courier New", monospace;
    touch-action: none;
  }
  #scene {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: crosshair;
  }
  .hud {
    position: absolute; top: 14px; left: 16px;
    color: #eaf4ff; user-select: none; pointer-events: none;
    text-shadow: 2px 2px 0 rgba(10, 30, 60, .65);
  }
  .hud h1 { font-size: 15px; letter-spacing: 3px; margin-bottom: 6px; }
  .hud p  { font-size: 11px; letter-spacing: 1px; line-height: 1.7; opacity: .92; white-space: pre-line; }
  .hud .counter { margin-top: 8px; font-size: 11px; letter-spacing: 2px; color: #ffd76a; }
  .corner {
    position: absolute; right: 16px; bottom: 12px; text-align: right;
    color: #eaf4ff; font-size: 10px; letter-spacing: 2px; line-height: 1.8;
    text-shadow: 2px 2px 0 rgba(10, 30, 60, .65);
    user-select: none; pointer-events: none;
  }
  .flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; transition: opacity .25s; }
  #stick {
    position: absolute; left: 22px; bottom: 24px;
    width: 118px; height: 118px; border-radius: 50%;
    border: 3px solid rgba(234,244,255,.55);
    background: rgba(10,30,60,.22);
    display: none; touch-action: none;
  }
  #knob {
    position: absolute; left: 50%; top: 50%;
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(234,244,255,.85);
    transform: translate(-50%, -50%);
    box-shadow: 2px 2px 0 rgba(10,30,60,.5);
  }
  #exitBtn {
    position: absolute; top: 14px; right: 16px;
    padding: 8px 14px; display: none;
    font-family: inherit; font-size: 12px; letter-spacing: 2px;
    color: #1b3a6b; background: #eaf4ff;
    border: 0; box-shadow: 3px 3px 0 rgba(10,30,60,.6);
    cursor: pointer;
  }
  #exitBtn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 rgba(10,30,60,.6); }
  .tag {
    position: absolute; left: 50%; top: 64%;
    transform: translateX(-50%);
    color: #ffd76a; font-size: 12px; letter-spacing: 3px;
    text-shadow: 2px 2px 0 rgba(10,30,60,.65);
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div class="hud">
  <h1>▚ VOXEL SQUADRON · TAIPEI ▞</h1>
  <p id="help"></p>
  <div class="counter">MISSILES FIRED: <span id="count">0</span></div>
</div>
<div class="corner"><span id="spd">SPD 480KT</span><br><span id="alt">ALT 1200FT</span><br>TPE · XINYI DIST.</div>
<button id="exitBtn">✕ 返回編隊</button>
<div id="stick"><div id="knob"></div></div>
<div class="tag" id="tag"></div>
<div class="flash" id="flash"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
  // ---------- 基礎場景 ----------
  const canvas = document.getElementById('scene');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
  const PIXEL = 0.5;
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 600);

  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(Math.floor(w * PIXEL), Math.floor(h * PIXEL), false);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);

  scene.add(new THREE.HemisphereLight(0xbfdcff, 0x5a7ea0, 0.95));
  const sunLight = new THREE.DirectionalLight(0xfff2d6, 0.9);
  sunLight.position.set(30, 50, 20);
  scene.add(sunLight);

  // ---------- 工具 ----------
  const boxGeo = new THREE.BoxGeometry(1, 1, 1);
  const matCache = {};
  const mat = c => matCache[c] || (matCache[c] = new THREE.MeshLambertMaterial({ color: c }));
  function jitter(hex, amt) {
    const c = new THREE.Color(hex);
    c.offsetHSL(0, 0, (Math.random() - 0.5) * amt);
    return c.getHex();
  }
  function vox(group, x, y, z, sx, sy, sz, color, exact) {
    const m = new THREE.Mesh(boxGeo, mat(exact ? color : jitter(color, 0.07)));
    m.position.set(x, y, z);
    m.scale.set(sx, sy, sz);
    group.add(m);
    return m;
  }
  const randVec = r => new THREE.Vector3((Math.random()-.5)*r, (Math.random()-.5)*r, (Math.random()-.5)*r);

  // =====================================================
  //  點陣台北市
  // =====================================================
  const GROUND = -22;
  const CITY_HALF = 88;
  const city = new THREE.Group();
  scene.add(city);

  // 地面
  vox(city, 0, GROUND - 0.6, 0, CITY_HALF * 2, 1.2, CITY_HALF * 2, 0x5f6b5d, true);

  // 街道網格(每 14 單位一條)
  const ROAD = 0x3e454d;
  for (let g = -6; g <= 6; g++) {
    vox(city, g * 14, GROUND + 0.06, 0, 2.6, 0.12, CITY_HALF * 2, ROAD, true);
    vox(city, 0, GROUND + 0.06, g * 14, CITY_HALF * 2, 0.12, 2.6, ROAD, true);
  }

  // ---- 淡水河(西側蜿蜒)----
  const riverXAt = z => -64 + Math.sin(z * 0.045) * 6;
  for (let z = -CITY_HALF; z <= CITY_HALF; z += 8) {
    vox(city, riverXAt(z), GROUND + 0.1, z, 15, 0.22, 8.4, 0x3d7ab5, true);
    vox(city, riverXAt(z) + 9, GROUND + 0.12, z, 2.2, 0.26, 8.4, 0x6f8f5e, true); // 河岸綠帶
  }
  // 跨河橋
  for (const bz of [-22, 34]) {
    vox(city, riverXAt(bz), GROUND + 0.7, bz, 22, 0.5, 3, 0x8d959c, true);
    vox(city, riverXAt(bz), GROUND + 1.6, bz, 0.5, 1.6, 0.5, 0xb2342d, true); // 橋塔
  }

  // ---- 大安森林公園 ----
  vox(city, -20, GROUND + 0.08, 26, 21, 0.16, 17, 0x4e7d4a, true);
  const treeSpots = [];
  for (let i = 0; i < 34; i++) treeSpots.push([-20 + (Math.random()-.5)*18, 26 + (Math.random()-.5)*14]);
  for (let i = 0; i < 16; i++) treeSpots.push([10 + (Math.random()-.5)*16, -2 + (Math.random()-.5)*6]); // 101 周邊行道樹
  const treeMesh = new THREE.InstancedMesh(boxGeo, new THREE.MeshLambertMaterial({ color: 0x2f5d33 }), treeSpots.length);
  {
    const d = new THREE.Object3D();
    treeSpots.forEach((p, i) => {
      const s = 0.9 + Math.random() * 0.8;
      d.position.set(p[0], GROUND + 0.55 + s * 0.5, p[1]);
      d.scale.set(s, s * 1.1, s);
      d.rotation.y = Math.random() * Math.PI;
      d.updateMatrix();
      treeMesh.setMatrixAt(i, d.matrix);
    });
    treeMesh.instanceMatrix.needsUpdate = true;
    city.add(treeMesh);
  }

  // ---- 台北 101(主角,精細堆疊)----
  const T101 = new THREE.Group();
  T101.position.set(10, GROUND, -14);
  city.add(T101);
  {
    const JADE = 0x2a7466, JADE_D = 0x1f5f55, BAND = 0xcfd8de, GOLD = 0xd9a93f;
    // 裙樓與廣場
    vox(T101, 0, 0.5, 0, 11, 1, 11, 0x9aa3ad, true);
    vox(T101, 0, 1.4, 3.2, 7, 1.2, 3.4, 0x8b95a3);
    vox(T101, 0, 1.2, 3.2, 2.2, 1.6, 0.6, GOLD, true); // 入口金框
    // 基座收窄段(下寬上窄)
    const baseW = [7.0, 6.3, 5.6, 4.9];
    baseW.forEach((w, i) => vox(T101, 0, 1.7 + i * 1.3, -0.5, w, 1.3, w, i % 2 ? JADE_D : JADE));
    let y = 1.7 + baseW.length * 1.3;
    // 八節斗形樓段(下窄上寬,101 的招牌輪廓)
    for (let seg = 0; seg < 8; seg++) {
      const widths = [3.6, 4.05, 4.5];
      widths.forEach((w, i) => {
        vox(T101, 0, y + 0.36 + i * 0.72, -0.5, w, 0.72, w, i === 1 ? JADE : JADE_D);
      });
      y += 0.72 * 3;
      vox(T101, 0, y + 0.11, -0.5, 4.7, 0.22, 4.7, BAND, true); // 節間飾帶
      // 四面「如意」金飾
      for (const [dx, dz] of [[0, 2.42], [0, -2.42 - 1], [2.42, -0.5], [-2.42, -0.5]]) {
        const px = dx === 0 ? 0 : dx;
        const pz = dx === 0 ? (dz > 0 ? 2.42 - 0.5 + 0.5 : dz) : dz;
        vox(T101, px, y - 0.9, pz, dx === 0 ? 0.9 : 0.28, 0.55, dx === 0 ? 0.28 : 0.9, GOLD, true);
      }
      y += 0.22;
    }
    // 頂冠與塔尖
    vox(T101, 0, y + 0.6, -0.5, 2.6, 1.2, 2.6, JADE);
    vox(T101, 0, y + 1.7, -0.5, 1.6, 1.0, 1.6, JADE_D);
    vox(T101, 0, y + 2.5, -0.5, 0.9, 0.7, 0.9, BAND, true);
    vox(T101, 0, y + 4.4, -0.5, 0.22, 3.2, 0.22, 0xaab4bd, true); // 塔尖
    const beacon = vox(T101, 0, y + 6.2, -0.5, 0.4, 0.4, 0.4, 0xff2a2a, true);
    beacon.material = new THREE.MeshBasicMaterial({ color: 0xff2a2a, transparent: true });
    T101.userData.beacon = beacon;
  }

  // ---- 台北大巨蛋 ----
  {
    const dome = new THREE.Group(); dome.position.set(30, GROUND, 8); city.add(dome);
    vox(dome, 0, 0.8, 0, 12, 1.6, 9, 0xd9dde0, true);
    [9.5, 7.5, 5.2, 2.6].forEach((w, i) =>
      vox(dome, 0, 1.6 + 0.85 * (i + 0.5), 0, w, 0.85, w * 0.78, 0xc9a44a));
  }

  // ---- 中正紀念堂 ----
  {
    const cks = new THREE.Group(); cks.position.set(-36, GROUND, 4); city.add(cks);
    vox(cks, 0, 0.12, 0, 16, 0.18, 13, 0xc9c4b4, true); // 自由廣場
    vox(cks, 0, 1.9, -2, 6, 3.6, 6, 0xeef0ee, true);    // 白色堂體
    [6.8, 5.0, 3.2].forEach((w, i) => vox(cks, 0, 3.9 + i * 0.7, -2, w, 0.7, w, 0x2b5ca8, true)); // 藍琉璃頂
    vox(cks, 0, 6.2, -2, 0.5, 0.6, 0.5, 0xd9a93f, true); // 寶頂
    vox(cks, 0, 1.0, 4.2, 5, 2, 1, 0xeef0ee, true);      // 牌樓
  }

  // ---- 圓山大飯店(北側紅色宮殿)----
  {
    const gh = new THREE.Group(); gh.position.set(-22, GROUND, -64); city.add(gh);
    vox(gh, 0, 0.6, 0, 13, 1.2, 5.5, 0xd9dde0, true);    // 白色基座
    vox(gh, 0, 2.6, 0, 12, 2.8, 4.8, 0xb2342d, true);    // 紅色樓體
    vox(gh, 0, 2.6, 2.5, 11, 2.2, 0.3, 0x7e231e, true);  // 立面陰影柱列
    [12.8, 10.5].forEach((w, i) => vox(gh, 0, 4.3 + i * 0.75, 0, w, 0.75, 5.6 - i, 0xc98a2d, true)); // 金黃琉璃簷
  }

  // ---- 一般街區建築(InstancedMesh 依色票分桶)----
  const PALETTE = [0x9aa3ad, 0x8b95a3, 0xb8b2a4, 0x7d8aa0, 0xa3adb8, 0x6f7f94];
  const blds = [];
  function blocked(x, z) {
    if (x < -50) return true;                                  // 河區
    if (Math.hypot(x - 10, z + 14) < 12) return true;          // 101
    if (Math.abs(x + 20) < 13 && Math.abs(z - 26) < 11) return true; // 公園
    if (Math.abs(x - 30) < 9 && Math.abs(z - 8) < 7) return true;    // 巨蛋
    if (Math.abs(x + 36) < 10.5 && Math.abs(z - 4) < 9) return true; // 中正紀念堂
    if (Math.abs(x + 22) < 9 && Math.abs(z + 64) < 5) return true;   // 圓山
    return false;
  }
  for (let gx = -6; gx < 6; gx++) for (let gz = -6; gz < 6; gz++) {
    const cx = gx * 14 + 7, cz = gz * 14 + 7;
    const n = 1 + Math.floor(Math.random() * 3);
    for (let k = 0; k < n; k++) {
      const x = cx + (Math.random() - .5) * 7.5;
      const z = cz + (Math.random() - .5) * 7.5;
      if (blocked(x, z)) continue;
      const nearXinyi = Math.hypot(x - 10, z + 14) < 30;
      const h = nearXinyi ? 5 + Math.random() * 9 : 2 + Math.random() * 5;
      blds.push({
        x, z, h,
        w: 2.6 + Math.random() * 3, d: 2.6 + Math.random() * 3,
        c: Math.floor(Math.random() * PALETTE.length)
      });
    }
  }
  const roofSpots = [];
  PALETTE.forEach((col, ci) => {
    const list = blds.filter(b => b.c === ci);
    if (!list.length) return;
    const im = new THREE.InstancedMesh(boxGeo, new THREE.MeshLambertMaterial({ color: col }), list.length);
    const d = new THREE.Object3D();
    list.forEach((b, i) => {
      d.position.set(b.x, GROUND + b.h / 2, b.z);
      d.scale.set(b.w, b.h, b.d);
      d.rotation.set(0, 0, 0);
      d.updateMatrix();
      im.setMatrixAt(i, d.matrix);
      if (Math.random() < 0.45) roofSpots.push([b.x, GROUND + b.h, b.z]);
    });
    im.instanceMatrix.needsUpdate = true;
    city.add(im);
  });
  // 屋頂水塔
  {
    const im = new THREE.InstancedMesh(boxGeo, new THREE.MeshLambertMaterial({ color: 0x77818c }), roofSpots.length);
    const d = new THREE.Object3D();
    roofSpots.forEach((p, i) => {
      d.position.set(p[0] + (Math.random()-.5), p[1] + 0.45, p[2] + (Math.random()-.5));
      d.scale.setScalar(0.7 + Math.random() * 0.4);
      d.updateMatrix();
      im.setMatrixAt(i, d.matrix);
    });
    im.instanceMatrix.needsUpdate = true;
    city.add(im);
  }

  // ---- 街道車流 ----
  const cars = [];
  const CAR_COLORS = [0xd1342f, 0xe8eef2, 0x3f7fae, 0xffd76a, 0x4e7d4a, 0x3c4a58];
  for (let i = 0; i < 16; i++) {
    const m = new THREE.Mesh(boxGeo, mat(CAR_COLORS[i % CAR_COLORS.length]));
    const alongX = Math.random() < 0.5;
    const lane = (Math.floor(Math.random() * 13) - 6) * 14 + (Math.random() < .5 ? 0.7 : -0.7);
    m.scale.set(alongX ? 1.6 : 0.9, 0.55, alongX ? 0.9 : 1.6);
    m.position.y = GROUND + 0.42;
    scene.add(m);
    cars.push({ m, alongX, lane, pos: (Math.random()-.5) * CITY_HALF * 2, speed: (6 + Math.random() * 6) * (Math.random() < .5 ? 1 : -1) });
  }

  // =====================================================
  //  點陣 F-16
  // =====================================================
  const BODY = 0x8fa3b8, BODY_D = 0x6c8094, DARK = 0x3c4a58,
        CANOPY = 0x224b66, NOSE = 0x4a5866, MISSILE_W = 0xe8eef2;

  function buildF16() {
    const jet = new THREE.Group();
    const s = 0.5;
    const v = (x,y,z,sx,sy,sz,c,e) => vox(jet, x*s,y*s,z*s, sx*s,sy*s,sz*s, c, e);

    v(0, 0, 7.6, 0.9, 0.9, 1.4, NOSE);
    v(0, 0.05, 6.2, 1.5, 1.3, 1.6, BODY);
    v(0, 0.1, 4.0, 2.1, 1.7, 2.8, BODY);
    v(0, 1.25, 3.4, 1.3, 0.9, 2.4, CANOPY, true);
    v(0, 1.78, 3.4, 0.9, 0.32, 1.6, 0x3f7fa6, true);
    v(0, 0, 0.6, 2.5, 1.9, 4.0, BODY);
    v(0, 0.55, 0.6, 1.7, 1.0, 4.0, BODY_D);
    v(0, -1.15, 2.6, 1.5, 0.95, 2.6, DARK);
    v(0, -1.15, 4.0, 1.3, 0.75, 0.5, 0x10161c, true);
    v(0, 0, -2.6, 2.2, 1.7, 2.4, BODY_D);
    v(0, 0, -4.3, 1.6, 1.4, 1.2, DARK);
    v(0, 0, -5.0, 1.2, 1.0, 0.5, 0x10161c, true);

    for (const side of [-1, 1]) {
      v(side*2.1, -0.1, -0.4, 2.0, 0.35, 3.4, BODY);
      v(side*3.7, -0.1, -1.0, 1.6, 0.32, 2.6, BODY);
      v(side*4.9, -0.1, -1.5, 1.0, 0.3, 1.8, BODY_D);
      v(side*5.6, -0.1, -0.6, 0.45, 0.45, 2.6, MISSILE_W, true);
      v(side*5.6, -0.1, 0.85, 0.4, 0.4, 0.5, 0xd1342f, true);
      v(side*2.2, 0, -4.4, 1.8, 0.3, 1.5, BODY_D);
    }
    v(0, 1.5, -3.9, 0.45, 1.6, 1.7, BODY);
    v(0, 2.9, -4.3, 0.4, 1.3, 1.2, BODY_D);
    v(0, 3.6, -4.5, 0.38, 0.5, 0.9, 0xd1342f, true);

    const flame = vox(jet, 0, 0, -5.5*s, 0.45, 0.45, 0.9, 0xff8c2a, true);
    flame.material = new THREE.MeshBasicMaterial({ color: 0xff9430, transparent: true, opacity: 0.95 });
    jet.userData.flame = flame;
    jet.userData.hardpoints = [
      new THREE.Vector3(-5.6*s, -0.1*s, 1.2*s),
      new THREE.Vector3( 5.6*s, -0.1*s, 1.2*s)
    ];
    jet.userData.nextHp = 0;
    jet.userData.isJet = true;
    jet.rotation.order = 'YXZ';
    return jet;
  }

  const squadron = new THREE.Group();
  scene.add(squadron);
  const jets = [];
  const formation = [
    { x: 0,    y: 1.2,  z: 2.5,  phase: 0.0, name: 'JET-1' },
    { x: -4.6, y: 0.2,  z: -2.0, phase: 1.9, name: 'JET-2' },
    { x: 4.6,  y: -0.4, z: -2.0, phase: 4.1, name: 'JET-3' }
  ];
  formation.forEach(f => {
    const jet = buildF16();
    jet.position.set(f.x, f.y, f.z);
    jet.userData.base = f;
    squadron.add(jet);
    jets.push(jet);
  });

  // 編隊繞城巡航路徑(以市中心為圓心)
  const circuit = { cx: 0, cz: -6, cy: 5, radius: 42, angle: 0, speed: 0.09 };
  function updateCircuit(dt, t) {
    circuit.angle += circuit.speed * dt;
    const a = circuit.angle;
    squadron.position.set(
      circuit.cx + circuit.radius * Math.sin(a),
      circuit.cy + Math.sin(t * 0.4) * 1.6,   // 緩慢的高度起伏
      circuit.cz + circuit.radius * Math.cos(a)
    );
    // 機頭朝切線方向 + 輕微擺動
    squadron.rotation.y = Math.atan2(Math.cos(a), -Math.sin(a)) + Math.sin(t * 0.5) * 0.05;
    // 編隊沿圓周左轉繞行 → 向圓心(左側)壓坡度,左翼下沉
    squadron.rotation.z = -0.22 + Math.sin(t * 0.7) * 0.04;
  }
  updateCircuit(0, 0); // 先就定位

  // ---------- 點陣雲 ----------
  const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.88 });
  const clouds = [];
  const RANGE = { x: 70, y: 26, z: 110 };
  const CLOUD_MIN_Y = GROUND + 17;
  function makeCloud() {
    const g = new THREE.Group();
    const n = 5 + Math.floor(Math.random() * 5);
    for (let i = 0; i < n; i++) {
      const m = new THREE.Mesh(boxGeo, cloudMat);
      m.position.set((Math.random()-.5)*7, (Math.random()-.5)*1.6, (Math.random()-.5)*4);
      const sc = 1.6 + Math.random() * 2.6;
      m.scale.set(sc*(1+Math.random()), sc*0.55, sc);
      g.add(m);
    }
    return g;
  }
  for (let i = 0; i < 14; i++) {
    const c = makeCloud();
    c.position.set((Math.random()-.5)*RANGE.x*2, CLOUD_MIN_Y + Math.random()*26, (Math.random()-.5)*RANGE.z*2);
    c.userData.speed = 10 + Math.random() * 8;
    scene.add(c); clouds.push(c);
  }

  const sunGroup = new THREE.Group();
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffd45e });
  [[0,0,7],[0,4.2,5],[0,-4.2,5],[4.2,0,5],[-4.2,0,5],[3,3,4],[-3,3,4],[3,-3,4],[-3,-3,4]]
    .forEach(p => { const m = new THREE.Mesh(boxGeo, sunMat); m.position.set(p[0], p[1], 0); m.scale.setScalar(p[2]); sunGroup.add(m); });
  scene.add(sunGroup);

  // ---------- 粒子 ----------
  const particles = [];
  function spawnParticle(pos, vel, color, size, life, gravity, additive) {
    const m = new THREE.Mesh(boxGeo, new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 1,
      blending: additive ? THREE.AdditiveBlending : THREE.NormalBlending,
      depthWrite: !additive
    }));
    m.position.copy(pos);
    m.scale.setScalar(size);
    m.rotation.set(Math.random()*3, Math.random()*3, 0);
    scene.add(m);
    particles.push({ m, vel, life, maxLife: life, gravity });
  }
  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      if (p.life <= 0) { scene.remove(p.m); p.m.material.dispose(); particles.splice(i, 1); continue; }
      p.vel.y -= p.gravity * dt;
      p.m.position.addScaledVector(p.vel, dt);
      if (p.m.position.y < GROUND + 0.25) { // 粒子落地反彈
        p.m.position.y = GROUND + 0.25;
        p.vel.y *= -0.35;
        p.vel.x *= 0.7; p.vel.z *= 0.7;
      }
      p.m.material.opacity = p.life / p.maxLife;
      p.m.scale.multiplyScalar(0.985);
    }
  }

  // ---------- 飛彈 ----------
  const missiles = [];
  let fired = 0, fireCooldown = 0;
  const countEl = document.getElementById('count');
  const flashEl = document.getElementById('flash');

  function buildMissile() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(boxGeo, mat(0xf2f5f7)); body.scale.set(.24,.24,1.5); g.add(body);
    const tip = new THREE.Mesh(boxGeo, mat(0xd1342f)); tip.scale.set(.18,.18,.35); tip.position.z = .9; g.add(tip);
    for (const a of [[0.2,0],[-0.2,0],[0,0.2],[0,-0.2]]) {
      const fin = new THREE.Mesh(boxGeo, mat(0x6c8094));
      fin.scale.set(.3,.3,.3).multiply(new THREE.Vector3(a[0]?1.4:.25, a[1]?1.4:.25, 1));
      fin.position.set(a[0], a[1], -0.65); g.add(fin);
    }
    return g;
  }

  function fireMissile(jet) {
    if (fireCooldown > 0) return;
    fireCooldown = 0.18;
    const hpLocal = jet.userData.hardpoints[jet.userData.nextHp];
    jet.userData.nextHp = (jet.userData.nextHp + 1) % 2;
    const start = hpLocal.clone(); jet.localToWorld(start);
    const q = jet.getWorldQuaternion(new THREE.Quaternion());
    const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(q);

    const m = buildMissile();
    m.position.copy(start);
    m.quaternion.copy(q);
    scene.add(m);
    missiles.push({ m, dir, speed: 30, life: 1.6 });

    for (let i = 0; i < 8; i++) {
      spawnParticle(start.clone(),
        dir.clone().multiplyScalar(-3 - Math.random()*3).add(randVec(2)),
        i % 2 ? 0xffc14d : 0xff7a1f, 0.28 + Math.random()*.2, .35, 0, true);
    }
    fired++; countEl.textContent = fired;
  }

  function explode(pos, big) {
    const n = big ? 34 : 26;
    for (let i = 0; i < n; i++) {
      const c = [0xffe28a, 0xffa03a, 0xff5c22, 0x9aa6b0][i % 4];
      spawnParticle(pos.clone(), randVec(big ? 20 : 16), c, 0.35 + Math.random()*.45, .55 + Math.random()*.5, 9, i % 4 !== 3);
    }
    flashEl.style.opacity = 0.25;
    setTimeout(() => flashEl.style.opacity = 0, 60);
  }

  function updateMissiles(dt) {
    for (let i = missiles.length - 1; i >= 0; i--) {
      const ms = missiles[i];
      ms.life -= dt;
      ms.speed += 20 * dt;
      ms.m.position.addScaledVector(ms.dir, ms.speed * dt);
      if (Math.random() < 0.85) {
        spawnParticle(ms.m.position.clone().addScaledVector(ms.dir, -0.8),
          randVec(0.8), Math.random() < .5 ? 0xdfe6ea : 0xb8c2c9, 0.22 + Math.random()*.15, .6, 0.5, false);
      }
      const hitGround = ms.m.position.y <= GROUND + 0.5;
      if (ms.life <= 0 || hitGround) {
        if (hitGround) ms.m.position.y = GROUND + 0.5;
        explode(ms.m.position, hitGround);
        scene.remove(ms.m);
        missiles.splice(i, 1);
      }
    }
  }

  // ---------- 模式狀態 ----------
  let mode = 'orbit';
  let activeJet = null;
  const flight = { yaw: 0, pitch: 0, bank: 0, speed: 17 };
  const input = { pitch: 0, roll: 0, boost: false };
  const keys = {};
  const MIN_ALT = GROUND + 3;

  const helpEl = document.getElementById('help');
  const tagEl = document.getElementById('tag');
  const exitBtn = document.getElementById('exitBtn');
  const stickEl = document.getElementById('stick');
  const knobEl = document.getElementById('knob');
  const spdEl = document.getElementById('spd');
  const altEl = document.getElementById('alt');

  const HELP_ORBIT = '編隊繞行台北市巡航中\n拖曳　360° 環繞檢視　　滾輪 / 雙指　縮放\n點擊戰機　接管駕駛\n試試低空穿越台北 101!';
  const HELP_FLY = '↑↓ / W S　俯仰　　← → / A D　滾轉\nSHIFT　加速　　空白鍵 / 點擊畫面　發射飛彈\n壓坡度才會轉彎 · 俯衝增速 / 爬升減速\nESC　返回編隊';
  helpEl.textContent = HELP_ORBIT;

  function setMode(m) {
    mode = m;
    const flying = m === 'fly';
    exitBtn.style.display = flying ? 'block' : 'none';
    stickEl.style.display = flying ? 'block' : 'none';
    helpEl.textContent = flying ? HELP_FLY : HELP_ORBIT;
  }

  function takeControl(jet) {
    activeJet = jet;
    jet.userData.docking = false;
    scene.attach(jet);
    const e = new THREE.Euler().setFromQuaternion(jet.getWorldQuaternion(new THREE.Quaternion()), 'YXZ');
    flight.yaw = e.y; flight.pitch = -e.x; flight.bank = e.z;
    setMode('fly');
    tagEl.textContent = '✈ 接管 ' + jet.userData.base.name;
    tagEl.style.opacity = 1;
    setTimeout(() => tagEl.style.opacity = 0, 1400);
  }

  function releaseControl() {
    if (!activeJet) return;
    setMode('return');
    tagEl.textContent = '↩ ' + activeJet.userData.base.name + ' 歸隊中';
    tagEl.style.opacity = 1;
    setTimeout(() => tagEl.style.opacity = 0, 1400);
  }

  // ---------- 軌道攝影機 ----------
  const orbit = { theta: 0.7, phi: 1.02, radius: 24, target: new THREE.Vector3(0, 0.5, 0) };
  function applyOrbitCamera() {
    const { theta, phi, radius, target } = orbit;
    camera.position.set(
      target.x + radius * Math.sin(phi) * Math.sin(theta),
      target.y + radius * Math.cos(phi),
      target.z + radius * Math.sin(phi) * Math.cos(theta)
    );
    camera.lookAt(target);
  }

  // ---------- 指標事件 ----------
  let dragging = false, moved = 0, lastX = 0, lastY = 0, pinchDist = 0;
  const pointers = new Map();

  canvas.addEventListener('pointerdown', e => {
    pointers.set(e.pointerId, e);
    dragging = true; moved = 0; lastX = e.clientX; lastY = e.clientY;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', e => {
    if (!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, e);
    if (mode !== 'orbit') return;
    if (pointers.size === 2) {
      const [a, b] = [...pointers.values()];
      const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
      if (pinchDist) orbit.radius = THREE.MathUtils.clamp(orbit.radius * (pinchDist / d), 8, 70);
      pinchDist = d; moved = 99;
      return;
    }
    if (!dragging) return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    moved += Math.abs(dx) + Math.abs(dy);
    orbit.theta -= dx * 0.006;
    orbit.phi = THREE.MathUtils.clamp(orbit.phi - dy * 0.005, 0.2, Math.PI / 2 + 0.45);
    lastX = e.clientX; lastY = e.clientY;
  });
  canvas.addEventListener('pointerup', e => {
    pointers.delete(e.pointerId);
    if (pointers.size < 2) pinchDist = 0;
    if (pointers.size === 0) dragging = false;
    if (moved < 6) handleClick(e.clientX, e.clientY);
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    if (mode === 'orbit') orbit.radius = THREE.MathUtils.clamp(orbit.radius + e.deltaY * 0.02, 8, 70);
  }, { passive: false });

  const raycaster = new THREE.Raycaster();
  const ndc = new THREE.Vector2();
  function handleClick(cx, cy) {
    if (mode === 'fly') { fireMissile(activeJet); return; }
    if (mode !== 'orbit') return;
    ndc.set((cx / window.innerWidth) * 2 - 1, -(cy / window.innerHeight) * 2 + 1);
    raycaster.setFromCamera(ndc, camera);
    const hits = raycaster.intersectObjects(jets, true);
    if (!hits.length) return;
    let obj = hits[0].object;
    while (obj && !obj.userData.isJet) obj = obj.parent;
    if (obj) takeControl(obj);
  }

  // ---------- 鍵盤 ----------
  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') { e.preventDefault(); if (mode === 'fly') fireMissile(activeJet); }
    if (e.code === 'Escape' && mode === 'fly') releaseControl();
  });
  window.addEventListener('keyup', e => keys[e.code] = false);
  exitBtn.addEventListener('click', releaseControl);

  // ---------- 虛擬搖桿 ----------
  let stickId = null;
  stickEl.addEventListener('pointerdown', e => {
    e.stopPropagation(); stickId = e.pointerId;
    stickEl.setPointerCapture(e.pointerId);
    moveStick(e);
  });
  stickEl.addEventListener('pointermove', e => { if (e.pointerId === stickId) moveStick(e); });
  function endStick(e) {
    if (e.pointerId !== stickId) return;
    stickId = null;
    input.pitch = 0; input.roll = 0;
    knobEl.style.left = '50%'; knobEl.style.top = '50%';
  }
  stickEl.addEventListener('pointerup', endStick);
  stickEl.addEventListener('pointercancel', endStick);
  function moveStick(e) {
    const r = stickEl.getBoundingClientRect();
    let dx = e.clientX - (r.left + r.width / 2);
    let dy = e.clientY - (r.top + r.height / 2);
    const max = r.width / 2 - 18;
    const len = Math.hypot(dx, dy);
    if (len > max) { dx *= max / len; dy *= max / len; }
    knobEl.style.left = `calc(50% + ${dx}px)`;
    knobEl.style.top = `calc(50% + ${dy}px)`;
    input.roll = dx / max;
    input.pitch = -dy / max;
  }

  // ---------- 飛行物理 ----------
  const tmpV = new THREE.Vector3();
  function readKeyInput() {
    let p = 0, rl = 0;
    if (keys['ArrowUp'] || keys['KeyW']) p += 1;
    if (keys['ArrowDown'] || keys['KeyS']) p -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) rl += 1;
    if (keys['ArrowLeft'] || keys['KeyA']) rl -= 1;
    if (p || rl) { input.pitch = p; input.roll = rl; }
    else if (stickId === null) { input.pitch = 0; input.roll = 0; }
    input.boost = !!keys['ShiftLeft'] || !!keys['ShiftRight'];
  }

  // ---------- 飛行物理(簡化空氣動力學)----------
  const G = 9.8;          // 重力加速度(遊戲單位)
  const STALL_SPEED = 9;  // 失速速度
  let stalled = false;

  function updateFlight(dt) {
    readKeyInput();
    // 滾轉:右壓桿 = 右滾,放開後副翼回中、緩慢回平
    if (input.roll) flight.bank = THREE.MathUtils.clamp(flight.bank + input.roll * 2.8 * dt, -1.05, 1.05);
    else flight.bank *= Math.max(0, 1 - 2.4 * dt);
    // 俯仰:放開後配平回平
    if (input.pitch) flight.pitch = THREE.MathUtils.clamp(flight.pitch + input.pitch * 1.7 * dt, -1.25, 1.25);
    else flight.pitch *= Math.max(0, 1 - 0.5 * dt);

    // 協調轉彎:轉彎率 ω = g·tanφ / V
    // → 必須先壓坡度(bank)才會轉彎,且速度越快、轉彎半徑越大
    flight.yaw -= (G * Math.tan(flight.bank) / flight.speed) * dt;

    // 能量管理:推力使速度朝目標收斂,
    // 重力沿航跡分量 g·sin(γ) → 爬升損失空速、俯衝換取空速
    const thrust = input.boost ? 30 : 18;
    flight.speed += ((thrust - flight.speed) * 1.2 - Math.sin(flight.pitch) * G * 0.55) * dt;
    flight.speed = THREE.MathUtils.clamp(flight.speed, 5, 40);

    // 失速:空速低於失速速度,升力不足 → 機鼻自動下垂換取空速
    stalled = flight.speed < STALL_SPEED;
    if (stalled) {
      flight.pitch -= (STALL_SPEED - flight.speed) * 0.35 * dt;
      tagEl.textContent = '⚠ STALL 失速 — 俯衝恢復空速';
      tagEl.style.opacity = 1;
    } else if (tagEl.textContent.includes('STALL')) {
      tagEl.style.opacity = 0;
    }

    // 姿態:rotation.z = +bank → 右滾右翼下沉、左滾左翼下沉
    activeJet.rotation.set(-flight.pitch, flight.yaw, flight.bank, 'YXZ');
    tmpV.set(0, 0, 1).applyQuaternion(activeJet.quaternion);
    activeJet.position.addScaledVector(tmpV, flight.speed * dt);
    // 升力垂直分量 L·cosφ:坡度越大,垂直升力越少 → 大坡度轉彎會掉高度
    activeJet.position.y -= (1 - Math.cos(flight.bank)) * 5.5 * dt;

    // 低空保護:不撞穿地面
    if (activeJet.position.y < MIN_ALT) {
      activeJet.position.y = MIN_ALT;
      if (flight.pitch < 0) flight.pitch = 0;
    }

    const camOffset = tmpV.clone().multiplyScalar(-11).add(new THREE.Vector3(0, 3.2, 0));
    const desired = activeJet.position.clone().add(camOffset);
    camera.position.lerp(desired, 1 - Math.exp(-5 * dt));
    if (camera.position.y < GROUND + 1.5) camera.position.y = GROUND + 1.5;
    const lookAt = activeJet.position.clone().addScaledVector(tmpV, 6);
    camera.lookAt(lookAt);

    activeJet.userData.flame.scale.z = (input.boost ? 1.8 : 0.9) + Math.random() * 0.8;

    spdEl.textContent = 'SPD ' + Math.round(flight.speed * 28) + 'KT';
    altEl.textContent = 'ALT ' + Math.max(0, Math.round((activeJet.position.y - GROUND) * 55)) + 'FT';
  }

  function updateReturn(dt) {
    const f = activeJet.userData.base;
    const target = squadron.localToWorld(new THREE.Vector3(f.x, f.y, f.z));
    const toT = target.clone().sub(activeJet.position);
    const dist = toT.length();

    if (dist < 2.2) {
      squadron.attach(activeJet);
      activeJet.userData.docking = true; // 交給主迴圈平滑融入編隊,避免瞬間跳位
      activeJet = null;
      setMode('orbit');
      return;
    }
    toT.normalize();
    const yawT = Math.atan2(toT.x, toT.z);
    const pitchT = Math.asin(THREE.MathUtils.clamp(toT.y, -1, 1));
    let dy = yawT - flight.yaw;
    while (dy > Math.PI) dy -= Math.PI * 2;
    while (dy < -Math.PI) dy += Math.PI * 2;
    flight.yaw += dy * Math.min(1, 2.2 * dt);
    flight.pitch += (pitchT - flight.pitch) * Math.min(1, 2.2 * dt);
    flight.bank += (THREE.MathUtils.clamp(-dy * 1.4, -0.8, 0.8) - flight.bank) * Math.min(1, 3 * dt);
    flight.speed += (Math.min(20, 8 + dist) - flight.speed) * Math.min(1, 2 * dt);

    activeJet.rotation.set(-flight.pitch, flight.yaw, flight.bank, 'YXZ');
    tmpV.set(0, 0, 1).applyQuaternion(activeJet.quaternion);
    activeJet.position.addScaledVector(tmpV, Math.min(flight.speed, dist / dt * 0.9) * dt);
    if (activeJet.position.y < MIN_ALT) activeJet.position.y = MIN_ALT;

    applyOrbitCamera();
  }

  // ---------- 動畫主迴圈 ----------
  const clock = new THREE.Clock();
  const focus = new THREE.Vector3();
  const tmpTarget = new THREE.Vector3();
  const dockPos = new THREE.Vector3();
  const dockQuat = new THREE.Quaternion();
  const dockEuler = new THREE.Euler(0, 0, 0, 'YXZ');
  orbit.target.copy(squadron.position).y += 0.5; // 開場即對準編隊

  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    const t = clock.elapsedTime;
    fireCooldown -= dt;

    jets.forEach(jet => {
      if (jet === activeJet) return;
      const f = jet.userData.base;
      dockPos.set(
        f.x + Math.sin(t * 0.6 + f.phase) * 0.5,
        f.y + Math.sin(t * 1.3 + f.phase) * 0.55,
        f.z
      );
      dockEuler.set(
        Math.sin(t * 1.1 + f.phase * 2) * 0.05,
        Math.sin(t * 0.5 + f.phase) * 0.06,
        Math.sin(t * 0.9 + f.phase) * 0.16
      );
      if (jet.userData.docking) {
        // 剛歸隊:位置與姿態指數收斂到編隊擺動軌跡
        const k = 1 - Math.exp(-3 * dt);
        jet.position.lerp(dockPos, k);
        dockQuat.setFromEuler(dockEuler);
        jet.quaternion.slerp(dockQuat, k);
        if (jet.position.distanceToSquared(dockPos) < 0.01 && jet.quaternion.angleTo(dockQuat) < 0.02)
          jet.userData.docking = false;
      } else {
        jet.position.copy(dockPos);
        jet.rotation.copy(dockEuler);
      }
      jet.userData.flame.scale.z = 0.9 + Math.random() * 0.8;
      jet.userData.flame.material.opacity = 0.7 + Math.random() * 0.3;
      if (Math.random() < 0.3) {
        const p = new THREE.Vector3(0, 0, -3); jet.localToWorld(p);
        spawnParticle(p, randVec(0.6).setZ(-6 - Math.random()*3), 0xcfd8de, 0.16, 0.5, 0, false);
      }
    });
    updateCircuit(dt, t); // 編隊繞行台北市
    // 環繞鏡頭目標平滑跟隨編隊
    tmpTarget.copy(squadron.position).y += 0.5;
    orbit.target.lerp(tmpTarget, 1 - Math.exp(-4 * dt));

    if (activeJet && Math.random() < 0.4) {
      const p = new THREE.Vector3(0, 0, -3); activeJet.localToWorld(p);
      const back = tmpV.set(0, 0, -1).applyQuaternion(activeJet.quaternion).multiplyScalar(7);
      spawnParticle(p, back.clone().add(randVec(0.6)), 0xcfd8de, 0.16, 0.5, 0, false);
    }

    // 101 塔頂警示燈閃爍
    T101.userData.beacon.material.opacity = Math.sin(t * 4.5) > 0 ? 1 : 0.12;

    // 街道車流
    cars.forEach(c => {
      c.pos += c.speed * dt;
      if (c.pos > CITY_HALF) c.pos = -CITY_HALF;
      if (c.pos < -CITY_HALF) c.pos = CITY_HALF;
      if (c.alongX) { c.m.position.x = c.pos; c.m.position.z = c.lane; }
      else { c.m.position.z = c.pos; c.m.position.x = c.lane; }
    });

    if (mode === 'fly') updateFlight(dt);
    else if (mode === 'return') updateReturn(dt);
    else {
      applyOrbitCamera();
      spdEl.textContent = 'SPD 480KT';
      altEl.textContent = 'ALT 1200FT';
    }

    focus.copy(mode === 'fly' && activeJet ? activeJet.position : orbit.target);
    clouds.forEach(c => {
      c.position.z -= c.userData.speed * dt * (mode === 'fly' ? 0.4 : 1);
      ['x', 'y', 'z'].forEach(ax => {
        const r = RANGE[ax];
        if (c.position[ax] - focus[ax] > r) c.position[ax] -= r * 2;
        if (c.position[ax] - focus[ax] < -r) c.position[ax] += r * 2;
      });
      if (c.position.y < CLOUD_MIN_Y) c.position.y = CLOUD_MIN_Y + Math.random() * 18;
    });
    sunGroup.position.set(focus.x - 70, focus.y + 45, focus.z - 120);

    updateMissiles(dt);
    updateParticles(dt);
    renderer.render(scene, camera);
  }

  resize();
  applyOrbitCamera();
  animate();
})();
</script>
</body>
</html>
